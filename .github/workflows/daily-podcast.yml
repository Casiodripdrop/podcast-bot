name: Daily Podcast

on:
  schedule:
    # 4:17 UTC statt voller Stunde -- GitHub Actions verzoegert Cronjobs, die
    # exakt zur vollen Stunde starten sollen, bei hoher Last oft erheblich.
    # 4:17 UTC ≈ 6:17 Berlin-Zeit im Sommer, 5:17 im Winter.
    - cron: "17 4 * * *"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run podcast generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL }}
          PODCAST_OWNER_EMAIL: ${{ vars.PODCAST_OWNER_EMAIL }}
          PODCAST_OWNER_NAME: ${{ vars.PODCAST_OWNER_NAME }}
        run: python main.py

      - name: Commit and push new episode
        run: |
          git config user.name "podcast-bot"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Add episode for $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
