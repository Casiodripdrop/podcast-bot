name: Daily Podcast

# Wird taeglich extern via cron-job.org getriggert (GitHubs eigener
# "schedule"-Trigger verzoegerte sich zuverlaessig um Stunden). Der
# "Run workflow"-Button in der Actions-UI funktioniert weiterhin fuer Tests.
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run podcast generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PODCAST_BASE_URL: ${{ vars.PODCAST_BASE_URL }}
          PODCAST_OWNER_EMAIL: ${{ vars.PODCAST_OWNER_EMAIL }}
          PODCAST_OWNER_NAME: ${{ vars.PODCAST_OWNER_NAME }}
        run: python main.py

      - name: Commit and push new episode
        run: |
          git config user.name "podcast-bot"
          git config user.email "actions@github.com"
          git add docs/
          git commit -m "Add episode for $(date +'%Y-%m-%d')" || echo "Nothing to commit"
          git push
